# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: zsetpack
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: BAS_CONNECT_NEW
          url: https://my433488.s4hana.cloud.sap
          scp: true
          authenticationType: reentranceTicket # SAML support for vscode
        app:
          name: ZSET_PACK_N
          package: ZSET_PACK
          transport: REPLACE_WITH_TRANSPORT
        exclude:
          - /test/
